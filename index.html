<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NASA APOD Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <p class="eyebrow">NASA Open API</p>
        <h1>Astronomy Picture of the Day</h1>
        <p class="subtitle">
          Explore NASA’s daily featured space image or video with details from
          the APOD API.
        </p>
      </header>

      <section class="controls card" aria-label="APOD controls">
        <form id="apod-form" class="control-row">
          <label for="date">Choose a date</label>
          <div class="date-actions">
            <button id="prev-day" class="nav-button" type="button">
              Last day
            </button>
            <input id="date" name="date" type="date" />
            <button id="next-day" class="nav-button" type="button">
              Next day
            </button>
            <button
              id="toggle-calendar"
              class="nav-button calendar-toggle"
              type="button"
              aria-expanded="true"
              aria-controls="calendar-panel"
            >
              ▲
            </button>
          </div>
          <section
            id="calendar-panel"
            class="calendar-panel"
            aria-label="Monthly APOD calendar"
          >
            <div class="calendar-header">
              <button id="prev-month" class="nav-button" type="button" aria-label="Previous month">
                ←
              </button>
              <p id="calendar-month" class="calendar-month"></p>
              <button id="next-month" class="nav-button" type="button" aria-label="Next month">
                →
              </button>
            </div>
            <div class="calendar-weekdays" aria-hidden="true">
              <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
          </section>
        </form>
        <p class="helper-text">
          Choose any APOD date from June 16, 1995 through today.
        </p>
      </section>

      <section class="status" aria-live="polite">
        <p id="status-message">Loading today’s picture...</p>
      </section>

      <section id="apod-card" class="apod card hidden" aria-label="APOD content">
        <div id="media-wrapper" class="media-wrapper"></div>

        <div class="content">
          <div class="meta">
            <p id="apod-date" class="date"></p>
            <p id="apod-copyright" class="copyright"></p>
          </div>

          <h2 id="apod-title"></h2>
          <p id="apod-explanation" class="explanation"></p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
